<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Disc Assembly Checklist</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f3ee;
    --surface: #ffffff;
    --border: #dddbd5;
    --text: #1a1917;
    --muted: #7a7874;
    --accent: #1a1917;
    --success: #2d6a4f;
    --success-bg: #d8f3dc;
    --done-text: #a0a09a;
    --section-color: #9a9890;
  }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .container { max-width: 600px; margin: 0 auto; }

  header {
    margin-bottom: 2rem;
    border-bottom: 1.5px solid var(--text);
    padding-bottom: 1.25rem;
  }

  .header-top {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 1rem;
    margin-bottom: 0.5rem;
  }

  h1 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 20px;
    font-weight: 500;
    letter-spacing: -0.02em;
  }

  .badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    background: var(--text);
    color: var(--bg);
    padding: 3px 8px;
    border-radius: 2px;
    white-space: nowrap;
  }

  .progress-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 0.75rem;
  }

  .bar-bg {
    flex: 1;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.25s ease;
    width: 0%;
  }

  .pct {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    min-width: 40px;
    text-align: right;
  }

  .reset-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    text-decoration: underline;
    text-underline-offset: 2px;
  }
  .reset-btn:hover { color: var(--text); }

  .section-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--section-color);
    margin: 1.75rem 0 0.5rem;
  }

  .section-label.buddy {
    color: var(--text);
    font-size: 11px;
    border: 1px solid var(--text);
    padding: 6px 10px;
    border-radius: 4px;
    display: inline-block;
    margin: 1.75rem 0 0.75rem;
  }

  .spacer { margin-top: 1rem; }

  .item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 11px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-bottom: 5px;
    cursor: pointer;
    transition: background 0.1s, border-color 0.1s;
    user-select: none;
  }

  .item:hover { border-color: #bbb9b2; }
  .item.done { background: #fafaf8; border-color: #e8e6e0; }

  .check {
    width: 18px;
    height: 18px;
    border-radius: 3px;
    border: 1.5px solid var(--border);
    flex-shrink: 0;
    margin-top: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, border-color 0.15s;
  }

  .item.done .check { background: var(--success); border-color: var(--success); }
  .check svg { opacity: 0; transition: opacity 0.1s; }
  .item.done .check svg { opacity: 1; }
  .text { flex: 1; }

  .label {
    font-size: 14px;
    line-height: 1.5;
    color: var(--text);
    transition: color 0.15s;
  }

  .item.done .label { text-decoration: line-through; color: var(--done-text); }

  .note {
    font-size: 12px;
    color: var(--muted);
    margin-top: 3px;
    line-height: 1.5;
  }

  .item.done .note { color: #c0bfba; }

  /* Dual checkbox rows */
  .dual-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 14px;
    margin-bottom: 4px;
  }
  .dual-header-spacer { flex: 1; }
  .dual-col-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    width: 52px;
    text-align: center;
  }

  .dual-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-bottom: 5px;
  }

  .dual-label {
    flex: 1;
    font-size: 14px;
    line-height: 1.5;
    color: var(--text);
  }

  .dual-check-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    width: 52px;
  }

  .dual-check {
    width: 18px;
    height: 18px;
    border-radius: 3px;
    border: 1.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    flex-shrink: 0;
  }

  .dual-check:hover { border-color: #bbb9b2; }
  .dual-check.done { background: var(--success); border-color: var(--success); }
  .dual-check svg { opacity: 0; transition: opacity 0.1s; }
  .dual-check.done svg { opacity: 1; }

  .final-note {
    margin-top: 1.75rem;
    padding: 12px 16px;
    border: 1.5px solid var(--text);
    border-radius: 4px;
    font-size: 14px;
    font-weight: 500;
    text-align: center;
    color: var(--text);
  }

  .complete-banner {
    display: none;
    margin-top: 1.5rem;
    padding: 12px 16px;
    background: var(--success-bg);
    border: 1px solid #b7e4c7;
    border-radius: 4px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    color: var(--success);
    text-align: center;
  }

  .complete-banner.show { display: block; }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="header-top">
      <h1>Disc Assembly Checklist</h1>
      <span class="badge" id="badge">0 / 0</span>
    </div>
    <div class="progress-row">
      <div class="bar-bg"><div class="bar-fill" id="bar"></div></div>
      <span class="pct" id="pct">0%</span>
      <button class="reset-btn" onclick="resetAll()">Reset</button>
    </div>
  </header>

  <div id="list"></div>
  <div class="complete-banner" id="banner">✓ All steps complete — disc ready</div>
</div>

<script>
const checkSVG = `<svg width="11" height="9" viewBox="0 0 11 9" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M1 4L4 7.5L10 1" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

const steps = [
  { section: "Arms Inspection" },
  { label: "Mechanical check the arms — carriage not wobbly, arm has no play in the clevis" },
  { label: "Torque marks present" },
  { label: "AEB grease packing mark present" },
  { label: "Diaphragm not ballooned" },
  { label: "Lens visual inspection — check for delamination and unusual marks" },

  { section: "Clevis & Disc" },
  { label: "Dowel pins present" },
  { label: "Verify R/F position on the disc matches the arm" },
  { label: "Put the arms into discs and torque the clevises", note: "Tighten screws evenly, not one at a time" },
  { label: "After torquing, verify disc is not deformed", note: "Use another disc as reference — it should sit loosely" },

  { section: "Pre-Seal Check" },
  { label: "Clean the sealing surface — should be scratch free" },
  { label: "Install data port plugs" },
  { label: "Secure flexes with tape before helium check" },
  { label: "O-ring of the disc present" },
  { label: "Helium check" },

  { section: "Flex & Connectors" },
  { label: "Install flex holddowns for front and rear" },
  { label: "Clean leftover Loctite if present" },
  { label: "Hand tighten AEB connector screws — check AEB connector is loose", note: "Risk of stripping" },

  { buddy: "Buddy Check" },

  { section: "UT Installation" },
  { label: "Check flexes have adhesive spacer installed on the back of the connectors" },
  { dual: true, label: "A — Check PBT front or rear screw" },
  { dual: true, label: "B — Blast air at connectors" },
  { dual: true, label: "C — Place UT sandwich into disc and secure with shoulder screws" },
  { dual: true, label: "D — Replace alignment pins with shoulder screws" },
  { dual: true, label: "E — Write UT sandwich number + F/R on arm body" },
  { spacer: true },
  { label: "Insert alignment pin on disc (engraved 22)" },
  { buddy: "Buddy Check" },
  { final: "Continue on Final Electronics Verification" },
];

const list = document.getElementById('list');
const bar = document.getElementById('bar');
const pctEl = document.getElementById('pct');
const badge = document.getElementById('badge');
const banner = document.getElementById('banner');
const items = [];

let dualHeaderAdded = false;

steps.forEach(s => {
  if (s.section) {
    dualHeaderAdded = false;
    const d = document.createElement('div');
    d.className = 'section-label';
    d.textContent = s.section;
    list.appendChild(d);
    return;
  }
  if (s.buddy) {
    const d = document.createElement('div');
    d.className = 'section-label buddy';
    d.textContent = '⊕ ' + s.buddy;
    list.appendChild(d);
    return;
  }
  if (s.spacer) {
    const d = document.createElement('div');
    d.className = 'spacer';
    list.appendChild(d);
    return;
  }
  if (s.final) {
    const d = document.createElement('div');
    d.className = 'final-note';
    d.textContent = s.final;
    list.appendChild(d);
    return;
  }
  if (s.dual) {
    if (!dualHeaderAdded) {
      const hdr = document.createElement('div');
      hdr.className = 'dual-header';
      hdr.innerHTML = `<div class="dual-header-spacer"></div><div class="dual-col-label">Front</div><div class="dual-col-label">Rear</div>`;
      list.appendChild(hdr);
      dualHeaderAdded = true;
    }
    const div = document.createElement('div');
    div.className = 'dual-item';
    const frontId = 'f_' + Math.random().toString(36).slice(2);
    const rearId = 'r_' + Math.random().toString(36).slice(2);
    div.innerHTML = `
      <div class="dual-label">${s.label}</div>
      <div class="dual-check-wrap">
        <div class="dual-check" id="${frontId}">${checkSVG}</div>
      </div>
      <div class="dual-check-wrap">
        <div class="dual-check" id="${rearId}">${checkSVG}</div>
      </div>`;
    list.appendChild(div);
    const front = div.querySelector('#' + frontId);
    const rear = div.querySelector('#' + rearId);
    front.addEventListener('click', () => { front.classList.toggle('done'); update(); });
    rear.addEventListener('click', () => { rear.classList.toggle('done'); update(); });
    items.push(front, rear);
    return;
  }

  const div = document.createElement('div');
  div.className = 'item';
  div.innerHTML = `<div class="check">${checkSVG}</div><div class="text"><div class="label">${s.label}</div>${s.note ? `<div class="note">${s.note}</div>` : ''}</div>`;
  div.addEventListener('click', () => { div.classList.toggle('done'); update(); });
  list.appendChild(div);
  items.push(div);
});

function update() {
  const done = items.filter(i => i.classList.contains('done')).length;
  const total = items.length;
  const pct = total ? Math.round(done / total * 100) : 0;
  bar.style.width = pct + '%';
  pctEl.textContent = pct + '%';
  badge.textContent = done + ' / ' + total;
  banner.classList.toggle('show', done === total);
}

function resetAll() {
  items.forEach(i => i.classList.remove('done'));
  update();
}

update();
</script>
</body>
</html>
